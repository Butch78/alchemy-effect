name: pkg.pr.new
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pkg-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Build
        run: bun run build
        working-directory: packages/better-auth

      - name: Publish
        run: bun pkg-pr-new publish --bun ./alchemy-effect ./packages/better-auth
